apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-websearch.fullname" . }}
  labels:
    {{- include "ai-websearch.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-websearch.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-websearch.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: patch-assets
          image: "ghcr.io/open-webui/open-webui:main"
          command:
            - /bin/sh
            - -c
            - |
              echo "Copying to /tmp/patched..."
              cp -rn /app/build/* /tmp/patched/
              echo "Patching absolute paths..."
              find /tmp/patched -type f \( -name "*.js" -o -name "*.html" -o -name "*.css" \) -exec sed -i 's|"/assets/|"/ai-websearch/assets/|g' {} +
              find /tmp/patched -type f \( -name "*.js" -o -name "*.html" -o -name "*.css" \) -exec sed -i "s|'/assets/|'/ai-websearch/assets/|g" {} +
              echo "Done."
          volumeMounts:
            - name: patched-assets
              mountPath: /tmp/patched
          resources:
            {{- toYaml .Values.resources.patcher | nindent 12 }}
      containers:
        - name: open-webui
          image: "ghcr.io/open-webui/open-webui:main"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: OPENAI_API_BASE_URL
              value: "http://localhost:8000/v1"
            - name: OPENAI_API_KEY
              value: "unused"
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "ai-websearch.fullname" .)) }}
                  key: WEBUI_SECRET_KEY
            - name: WEBUI_URL
              value: {{ .Values.ingress.webuiUrl | quote }}
            - name: ROOT_PATH
              value: "/ai-websearch"
            - name: ENABLE_PERSISTENT_CONFIG
              value: "False"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
            - name: patched-assets
              mountPath: /app/build
          resources:
            {{- toYaml .Values.resources.webui | nindent 12 }}
        - name: agent-backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: api
              containerPort: 8000
              protocol: TCP
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "ai-websearch.fullname" .)) }}
                  key: GROQ_API_KEY
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "ai-websearch.fullname" .)) }}
                  key: TAVILY_API_KEY
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
      volumes:
        - name: data
          emptyDir: {}
        - name: patched-assets
          emptyDir: {}
