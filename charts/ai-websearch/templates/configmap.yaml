apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-websearch.fullname" . }}-nginx-proxy
  labels:
    {{- include "ai-websearch.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
      include       mime.types;
      default_type  application/octet-stream;
      sendfile on;

      server {
        listen 80;

        # Serve the app at /ai-websearch/
        location /ai-websearch/ {
          # Strip the prefix and proxy to Open WebUI
          rewrite ^/ai-websearch/(.*)$ /$1 break;
          proxy_pass         http://localhost:8080;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;

          # Rewrite Location headers in redirects so they stay on the subpath
          proxy_redirect     / /ai-websearch/;
          proxy_redirect     http://localhost:8080/ /ai-websearch/;

          # Rewrite paths inside HTML/JS/CSS responses
          sub_filter_once off;
          sub_filter_types text/html text/css application/javascript application/json;
          sub_filter 'href="/'  'href="/ai-websearch/';
          sub_filter "href='/"  "href='/ai-websearch/";
          sub_filter 'src="/'   'src="/ai-websearch/';
          sub_filter "src='/"   "src='/ai-websearch/";
          sub_filter 'action="/' 'action="/ai-websearch/';
          sub_filter 'url("/'  'url("/ai-websearch/';

          # WebSocket support
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
        }

        # Redirect bare subpath to trailing slash
        location = /ai-websearch {
          return 301 /ai-websearch/;
        }
      }
    }
