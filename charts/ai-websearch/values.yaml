replicaCount: 1

image:
  repository: harbor.i2cv.io/cosmichorizon/ai-websearch-backend
  pullPolicy: Always
  tag: "latest"

imagePullSecrets:
  - name: s-hxl2n

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  portWeb: 8080

resources:
  webui:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  backend:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: ai-websearch.example.com
      paths:
        - path: /
          pathType: Prefix
          backendPort: 8080
  tls: []

secrets:
  groqApiKey: "YOUR_GROQ_API_KEY"
  tavilyApiKey: "YOUR_TAVILY_API_KEY"
  webuiSecretKey: "t0p-s3cr3t-k3y"
