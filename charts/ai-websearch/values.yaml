replicaCount: 1

image:
  repository: harbor.i2cv.io/cosmichorizon/ai-websearch-backend
  pullPolicy: Always
  tag: "latest"

imagePullSecrets:
  - name: s-hxl2n

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  portWeb: 8080

resources:
  webui:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  backend:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

ingress:
  enabled: true
  className: ""
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: test-cosmichorizon-worker-68a3110f01feebd0.elb.us-gov-west-1.amazonaws.com
      paths:
        - path: /ai-websearch
          pathType: Prefix
          backendPort: 8080
  tls: []

# Name of an existing secret to use instead of creating one.
# It should contain groq-api-key, tavily-api-key, and webui-secret-key.
existingSecret: "ai-websearch-secrets"

secrets:
  groqApiKey: ""
  tavilyApiKey: ""
  webuiSecretKey: ""
